<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <main class="wrapper">
    <section class="card">
      <div class="card-top-line"></div>
      <div class="grain"></div>

      <div class="top">
        

        <div class="title-row">
          <div class="title-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <rect x="5" y="10" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="15" r="1.2" fill="currentColor"/>
            </svg>
          </div>

          <div>
            <h1>Password Generator</h1>
            <p class="subtitle">
              Güçlü, hızlı ve modern bir şifre üretici. Uzunluk, karakter tipleri ve
              güven seviyesi tek ekranda.
            </p>
          </div>
        </div>
      </div>

      <div class="output-section">
        <div class="section-head">
          <div class="output-label-wrap">
            <span class="section-label">Oluşturulan Şifre</span>
            <span class="secure-pill">Secure</span>
          </div>

          <button id="copyBtn" class="copy-btn" type="button">Kopyala</button>
        </div>

        <div class="output-box">
          <span class="input-lock" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M8 10V8.5a4 4 0 1 1 8 0V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <rect x="6" y="10" width="12" height="9" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </span>

          <input
            type="text"
            id="result"
            readonly
            placeholder="Şifre oluşturmak için Generate butonuna bas..."
          />
        </div>
      </div>

      <div class="range-section panel">
        <div class="range-top">
          <span class="section-label">Uzunluk</span>
          <span id="lengthValue" class="length-value">16</span>
        </div>

        <input type="range" id="length" min="6" max="32" value="16" />

        <div class="range-labels">
          <span>6</span>
          <span>32</span>
        </div>
      </div>

      <div class="options-grid">
        <label class="option-card">
          <input type="checkbox" id="useLower" checked />
          <span class="checkmark"></span>
          <div class="option-text">
            <strong>Küçük Harf</strong>
            <small>a-z karakterleri dahil et</small>
          </div>
        </label>

        <label class="option-card">
          <input type="checkbox" id="useUpper" checked />
          <span class="checkmark"></span>
          <div class="option-text">
            <strong>Büyük Harf</strong>
            <small>A-Z karakterleri dahil et</small>
          </div>
        </label>

        <label class="option-card">
          <input type="checkbox" id="useNumbers" checked />
          <span class="checkmark"></span>
          <div class="option-text">
            <strong>Sayılar</strong>
            <small>0-9 karakterleri dahil et</small>
          </div>
        </label>

        <label class="option-card">
          <input type="checkbox" id="useSymbols" checked />
          <span class="checkmark"></span>
          <div class="option-text">
            <strong>Semboller</strong>
            <small>!@#$% gibi özel karakterler</small>
          </div>
        </label>
      </div>

      <div class="strength-section panel">
        <div class="strength-top">
          <span class="section-label">Strength</span>
          <div class="strength-meta">
            <strong id="strengthLabel">Başlangıç</strong>
            <span id="strengthText">0%</span>
          </div>
        </div>

        <div class="strength-track">
          <div id="strengthBar" class="strength-bar"></div>
        </div>

        <p id="strengthHint" class="strength-hint">
          Daha güçlü şifre için uzunluğu ve karakter çeşitliliğini artır.
        </p>
      </div>

      <div class="actions">
        <button id="generateBtn" class="btn btn-primary" type="button">
          Generate
        </button>
        <button id="shuffleBtn" class="btn btn-secondary" type="button">
          Yeni Üret
        </button>
        <button id="clearBtn" class="btn btn-dark" type="button">
          Temizle
        </button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
