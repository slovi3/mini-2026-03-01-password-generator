<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifre Oluşturucu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="wrapper">
    <section class="card">
      <div class="top">
        <span class="badge">Mini Project 02</span>
        <h1>Şifre Oluşturucu</h1>
        <p>
          Güçlü, hızlı ve modern bir şifre üretici. Uzunluk, karakter tipleri ve
          güven seviyesi tek ekranda.
        </p>
      </div>

      <div class="output-section">
        <label class="section-label">Oluşturulan Şifre</label>
        <div class="output-box">
          <input
            type="text"
            id="result"
            readonly
            placeholder="Şifre oluşturmak için butona bas..."
          />
          <button id="copyBtn" class="icon-btn" type="button">Kopyala</button>
        </div>
      </div>

      <div class="range-section">
        <div class="range-top">
          <label class="section-label">Uzunluk</label>
          <span id="lengthValue" class="length-value">16</span>
        </div>
        <input type="range" id="length" min="6" max="32" value="16" />
      </div>

      <div class="options-grid">
        <label class="option">
          <input type="checkbox" id="useLower" checked />
          <span class="checkmark"></span>
          <div>
            <strong>Küçük Harf</strong>
            <small>a-z karakterleri</small>
          </div>
        </label>

        <label class="option">
          <input type="checkbox" id="useUpper" checked />
          <span class="checkmark"></span>
          <div>
            <strong>Büyük Harf</strong>
            <small>A-Z karakterleri</small>
          </div>
        </label>

        <label class="option">
          <input type="checkbox" id="useNumbers" checked />
          <span class="checkmark"></span>
          <div>
            <strong>Sayılar</strong>
            <small>0-9 karakterleri</small>
          </div>
        </label>

        <label class="option">
          <input type="checkbox" id="useSymbols" checked />
          <span class="checkmark"></span>
          <div>
            <strong>Semboller</strong>
            <small>!@#$% gibi özel karakterler</small>
          </div>
        </label>
      </div>

      <div class="strength-section">
        <div class="strength-top">
          <span class="section-label">Strength</span>
          <span id="strengthText" class="strength-text">0%</span>
        </div>
        <div class="strength-track">
          <div id="strengthBar" class="strength-bar"></div>
        </div>
      </div>

      <div class="actions">
        <button id="generateBtn" class="btn primary" type="button">Generate</button>
        <button id="shuffleBtn" class="btn secondary" type="button">Yeni Üret</button>
        <button id="clearBtn" class="btn danger" type="button">Temizle</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
